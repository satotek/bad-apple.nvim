name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  engine:
    strategy:
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install Linux audio development library
        if: startsWith(matrix.os, 'ubuntu')
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - run: cargo build --release -p bav-engine -p bav-encode --target ${{ matrix.target }}
      - run: cp target/${{ matrix.target }}/release/bav-engine bav-engine-${{ matrix.target }}
      - run: cp target/${{ matrix.target }}/release/bav-encode bav-encode-${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.target }}
          path: |
            bav-engine-${{ matrix.target }}
            bav-encode-${{ matrix.target }}

  publish:
    needs: [engine]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
